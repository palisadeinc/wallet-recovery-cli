name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  release:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Pre-commit checks - mirrors local pre-commit workflow
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install tools
        run: |
          go install mvdan.cc/gofumpt@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || (echo "go.mod/go.sum not tidy - run 'go mod tidy'" && exit 1)

      - name: Verify generated code is up to date
        run: |
          go generate ./...
          git diff --exit-code || (echo "Generated code not up to date - run 'go generate ./...'" && exit 1)

      - name: Run tests
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.1.6

      - name: Verify formatting (gofumpt)
        run: |
          gofumpt -l -d . | tee /tmp/gofumpt.diff
          test ! -s /tmp/gofumpt.diff || (echo "Code not formatted - run 'gofumpt -w .'" && exit 1)

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false

  # Secrets scanning
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  # Build binaries for release
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-22.04
    needs: [pre-commit, secrets-scan]
    if: github.event_name == 'push' || github.event_name == 'release'
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Determine Version
        id: version
        # Run this only once, maybe better outside matrix or use outputs?
        # Let's run it in each job for simplicity, it's idempotent.
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            # Use tag name for releases (e.g., v1.0.0)
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            # Use short commit hash for main branch pushes
            echo "VERSION=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          fi
          echo "Determined version: ${{ env.VERSION }}"

      - name: Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BINARY_NAME="recovery-${GOOS}-${GOARCH}-${{ env.VERSION }}"
          if [ "$GOOS" = "windows" ]; then
            BINARY_NAME+=".exe"
          fi
          echo "Building $BINARY_NAME ..."
          mkdir -p dist # Create dist directory if it doesn't exist
          # Assumes main package is in ./cmd/recovery and has a main.Version variable
          # Adjust path and ldflags variable name if necessary
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -X 'main.Version=${{ env.VERSION }}'" -o "dist/${BINARY_NAME}" ./main.go
          echo "BINARY_PATH=dist/${BINARY_NAME}" >> $GITHUB_ENV # Pass path to next step
          echo "BINARY_NAME=${BINARY_NAME}" >> $GITHUB_ENV # Pass name to next step

          # Generate SHA256 Checksum
          CHECKSUM_NAME="${BINARY_NAME}.sha256"
          CHECKSUM_PATH="dist/${CHECKSUM_NAME}"
          echo "Generating checksum ${CHECKSUM_NAME} ..."
          # Use command based on TARGET OS ($GOOS), running on Linux runner
          if [ "$GOOS" = "darwin" ]; then
            # macOS uses shasum
            shasum -a 256 "dist/${BINARY_NAME}" > "${CHECKSUM_PATH}"
          else
            # Linux and Windows targets can use sha256sum on the Linux runner
            sha256sum "dist/${BINARY_NAME}" > "${CHECKSUM_PATH}"
          fi
          # Optional: Adjust output format if needed (e.g., remove filename from sha256sum output)
          # Example: sha256sum "dist/${BINARY_NAME}" | cut -d' ' -f1 > "${CHECKSUM_PATH}"
          echo "CHECKSUM_PATH=${CHECKSUM_PATH}" >> $GITHUB_ENV
          echo "CHECKSUM_NAME=${CHECKSUM_NAME}" >> $GITHUB_ENV

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: recovery-${{ matrix.goos }}-${{ matrix.goarch }}-${{ env.VERSION }} # Unique artifact name per build
          path: |
            ${{ env.BINARY_PATH }}
            ${{ env.CHECKSUM_PATH }} # Also include checksum in the workflow artifact
          if-no-files-found: error # Fail if the binary wasn't created

      - name: Upload Binary Release Asset
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ env.BINARY_PATH }}
          asset_name: ${{ env.BINARY_NAME }}
          asset_content_type: application/octet-stream

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-22.04
    needs: [pre-commit, secrets-scan]
    if: github.event_name == 'push' || github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom.spdx.json
            sbom.cyclonedx.json
          if-no-files-found: error

      - name: Attach SBOM to Release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: sbom.spdx.json
          asset_name: sbom.spdx.json
          asset_content_type: application/json

      - name: Attach CycloneDX SBOM to Release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: sbom.cyclonedx.json
          asset_name: sbom.cyclonedx.json
          asset_content_type: application/json
